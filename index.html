<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>DevSecOps Periodic Table</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <!-- Header -->
  <header>
    <h1>DevSecOps Periodic Table</h1>
    <input type="text" id="searchBar" placeholder="Search tools...">
    <select id="categoryFilter">
      <option value="all">All Categories</option>
    </select>
  </header>

  <!-- Legend -->
  <section id="legend" class="legend"></section>

  <!-- Periodic Table Grid -->
  <main id="periodicTable" class="grid"></main>

  <!-- Popup -->
  <div id="popup" class="popup hidden">
    <div class="popup-content">
      <span id="closePopup">&times;</span>
      <h2 id="popupSymbol"></h2>
      <h3 id="popupName"></h3>
      <p><strong>Category:</strong> <span id="popupCategory"></span></p>
      <p id="popupDescription"></p>
      <a id="popupWebsite" href="#" target="_blank">Official Website</a>
    </div>
  </div>

  <!-- Script -->
  <script src="script.js"></script>
</body>
</html>
