<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Periodic Table Explorer</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header class="topbar">
    <div>
      <h1>Periodic Table Explorer</h1>
      <p>Select categories to highlight matching tiles.</p>
    </div>
    <button id="clearFilters" type="button">Clear</button>
  </header>

  <section class="legend" id="legend" aria-label="Categories"></section>

  <main class="board-wrap">
    <div class="board-shell">
      <div class="board-title">Periodic Table of DevSecOps Tools</div>
      <div class="board" id="board" aria-label="Periodic table"></div>
    </div>
    <div id="status" class="status"></div>
  </main>

  <div class="overlay hidden" id="overlay"></div>
  <aside class="modal hidden" id="modal" role="dialog" aria-modal="true" aria-labelledby="modalTitle">
    <button class="close" id="closeModal" type="button" aria-label="Close">×</button>
    <div id="modalContent"></div>
  </aside>

  <script src="script.js"></script>
</body>
</html>
