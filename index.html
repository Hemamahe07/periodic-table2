<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Periodic Table of DevSecOps Tools</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header class="topbar">
    <div>
      <h1>Periodic Table of DevSecOps Tools</h1>
      <p>Select categories to highlight matching tools.</p>
    </div>
    <button id="clearFilters">Clear</button>
  </header>

  <section class="legend" id="legend"></section>

  <main class="board-wrap">
    <div class="board" id="board"></div>
  </main>

  <div class="overlay hidden" id="overlay"></div>
  <aside class="modal hidden" id="modal">
    <button class="close" id="closeModal">×</button>
    <div id="modalContent"></div>
  </aside>

  <script src="script.js"></script>
</body>
</html>
