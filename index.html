<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DevSecOps Periodic Table</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header class="topbar">
    <div class="title-block">
      <h1>DevSecOps Periodic Table</h1>
      <p>Interactive DevSecOps sample with exact periodic-table structure</p>
    </div>

    <div class="controls">
      <input id="searchInput" type="text" placeholder="Search by name, symbol, category..." />
      <select id="categoryFilter">
        <option value="all">All Categories</option>
      </select>
    </div>
  </header>

  <section class="legend-wrap">
    <div id="legend" class="legend"></div>
  </section>

  <main class="table-wrap">
    <div id="table" class="periodic-table" aria-label="DevSecOps Periodic Table"></div>
  </main>

  <div id="modalBackdrop" class="modal-backdrop hidden">
    <div class="modal">
      <button id="closeModal" class="close-btn" aria-label="Close">×</button>
      <div id="modalContent"></div>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
